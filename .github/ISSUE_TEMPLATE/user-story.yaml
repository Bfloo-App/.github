name: '👤 User Story'
description: 'Define a high-level slice of user value (For the Vision/Roadmap board)'
title: '[Story]: '
body:
  - type: markdown
    attributes:
      value: |
        ## 👤 User Story
        **PM Reminder:** This template is for defining high-level user value. Do not use this for specific coding tasks, database changes, or bugs. 
        *Once submitted, remember to break this down into smaller `💻 Task` and `🎨 Design` issues for your Active Execution board.*

  - type: textarea
    id: story
    attributes:
      label: 📖 The Story
      description: 'Use the standard Agile format: As a [user], I want [action] so that [value/benefit].'
      value: |
        **As a** [type of user]...
        **I want to** [perform some action]...
        **So that** [I get this specific benefit].
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: ✅ Acceptance Criteria
      description: 'What exactly proves this story is complete? (Use markdown checkboxes).'
      placeholder: |
        - [ ] The user can click the "Forgot Password" link on the login page.
        - [ ] An email is dispatched containing a secure, 15-minute token.
        - [ ] The user is successfully redirected to the dashboard after resetting.
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: 🧠 Initial Thoughts / Required Child Tasks
      description: 'Any early architectural ideas or a rough list of the child tasks needed across your 9 microservices to build this?'
      placeholder: |
        Will probably need:
        - `api-gateway`: Create POST /reset-password route
        - `web-client`: Design and build reset form UI
        - `database`: Add reset_token and token_expiry columns to users table
    validations:
      required: false
