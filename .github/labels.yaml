- name: 'comp: frontend'
  color: '4DA2B0'
  description: 'Client-side UI, CSS'

- name: 'comp: backend'
  color: '23A66F'
  description: 'Server-side logic and APIs'

- name: 'comp: infra'
  color: '875318'
  description: 'DevOps, Terraform, Vault policies'

- name: 'comp: database'
  color: 'A5A378'
  description: 'Schema changes, queries, migrations'

- name: 'comp: dependencies'
  color: 'EE042A'
